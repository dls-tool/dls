<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DLS Workshop Mobile</title>
    <style>
        :root { --primary: #2563eb; --red: #e11d48; --slate: #64748b; --bg: #f1f5f9; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        
        .wrapper { max-width: 700px; width: 100%; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #0f172a; margin: 0 0 20px 0; font-size: 1.4rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        /* Input Grid - Responsive */
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        @media (max-width: 380px) { .input-grid { grid-template-columns: 1fr; } }
        
        .fld { display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: 700; color: var(--slate); text-transform: uppercase; margin-bottom: 6px; padding-left: 4px; }
        input { padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; font-weight: 600; outline: none; transition: 0.2s; background: #fff; }
        input:focus { border-color: var(--primary); background: #f8faff; }

        /* Error Message */
        #error { color: white; background: var(--red); font-size: 13px; text-align: center; padding: 10px; border-radius: 10px; margin-bottom: 15px; display: none; animation: fadeIn 0.3s; }

        /* Result Section */
        .res-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .card { padding: 18px; border-radius: 16px; border: 1px solid #f1f5f9; }
        .card-mat { background: #eff6ff; border-left: 5px solid var(--primary); }
        .card-stat { background: #fff1f2; border-left: 5px solid var(--red); }
        
        h3 { font-size: 12px; margin: 0 0 12px 0; color: var(--slate); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 5px; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 15px; }
        .val { font-weight: 800; color: #0f172a; font-family: monospace; font-size: 16px; }
        .plus { color: var(--red); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<div class="wrapper">
    <h2>WORKSHOP CALC</h2>

    <div id="error">Range Error: Check your Levels</div>

    <div class="input-grid">
        <div class="fld"><label>From Level</label><input type="number" id="fL" value="1" placeholder="Ex: 1"></div>
        <div class="fld"><label>From Sub (1-5)</label><input type="number" id="fS" value="1" placeholder="1-5"></div>
        <div class="fld"><label>To Level</label><input type="number" id="tL" value="2" placeholder="Ex: 2"></div>
        <div class="fld"><label>To Sub (1-5)</label><input type="number" id="tS" value="1" placeholder="1-5"></div>
    </div>

    <div class="res-grid">

            <div class="row"><span>Blueprints:</span> <span class="val" id="outB">0</span></div>
        </div>

            <div class="row"><span>ATK/DEF:</span> <span class="val plus" id="outPct">0%</span></div>
        </div>
    </div>
</div>

    const inputs = ['fL', 'fS', 'tL', 'tS'];
    inputs.forEach(id => {
        document.getElementById(id).addEventListener('input', function() {
            handleSubLevelLogic(id);
            liveCalc();
        });
    });

    // Logic: Nếu nhập Sub = 6, tự nhảy Level lên 1 và Sub về 1
    // Nếu nhập Sub = 0, tự lùi Level xuống 1 và Sub về 5
    function handleSubLevelLogic(id) {
        let val = parseInt(document.getElementById(id).value);
        if (id === 'fS' || id === 'tS') {
            let levelId = id === 'fS' ? 'fL' : 'tL';
            let L = parseInt(document.getElementById(levelId).value);
            if (val > 5) {
                document.getElementById(levelId).value = L + 1;
                document.getElementById(id).value = 1;
            } else if (val < 1 && L > 1) {
                document.getElementById(levelId).value = L - 1;
                document.getElementById(id).value = 5;
            }
        }
    }

    function liveCalc() {
        const fL = parseInt(document.getElementById('fL').value) || 1;
        const fS = parseInt(document.getElementById('fS').value) || 1;
        const tL = parseInt(document.getElementById('tL').value) || 1;
        const tS = parseInt(document.getElementById('tS').value) || 1;
        const err = document.getElementById('error');

        const startIdx = (fL - 1) * 5 + (fS - 1);
        const targetIdx = (tL - 1) * 5 + (tS - 1);

        if (startIdx < 0 || targetIdx >= upgradeData.length || startIdx >= targetIdx) {
            err.style.display = 'block';
            updateUI(0, 0, 0, 0, 0, 0);
            return;
        }
        
        err.style.display = 'none';

        let m = 0, s = 0, b = 0;
        for (let i = startIdx; i < targetIdx; i++) {
            m += (Number(upgradeData[i]["Premium Metal"]) || 0);
            s += (Number(upgradeData[i]["High Carbon Steel"]) || 0);
            b += (Number(upgradeData[i]["Blueprints"]) || 0);
        }

        const dM = (Number(upgradeData[targetIdx]["Might"]) || 0) - (Number(upgradeData[startIdx]["Might"]) || 0);
        const dF = (Number(upgradeData[targetIdx]["FP/SP"]) || 0) - (Number(upgradeData[startIdx]["FP/SP"]) || 0);
        const dP = (Number(upgradeData[targetIdx]["%ATK/DEF"]) || 0) - (Number(upgradeData[startIdx]["%ATK/DEF"]) || 0);

        updateUI(m, s, b, dM, dF, dP);
    }

    function updateUI(m, s, b, dM, dF, dP) {
        document.getElementById('outM').innerText = m.toLocaleString();
        document.getElementById('outS').innerText = s.toLocaleString();
        document.getElementById('outB').innerText = b.toLocaleString();
        document.getElementById('outMight').innerText = "+" + dM.toLocaleString();
        document.getElementById('outFP').innerText = "+" + dF.toLocaleString();
        document.getElementById('outPct').innerText = "+" + dP.toFixed(1) + "%";
    }

    window.onload = liveCalc;
</script>
