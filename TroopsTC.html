<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Troop Training Optimizer Pro</title>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; --text: #0f172a; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 550px; }
        h2 { margin-top: 0; color: var(--primary); text-align: center; font-size: 1.6rem; margin-bottom: 25px; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
        .input-group { margin-bottom: 20px; padding: 15px; border: 1px solid #e2e8f0; border-radius: 10px; background-color: #ffffff; }
        .group-title { display: block; margin-bottom: 12px; font-weight: 700; font-size: 0.85rem; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; }
        .time-inputs { display: flex; gap: 8px; }
        .time-unit { flex: 1; }
        .time-unit label { display: block; font-size: 0.7rem; color: #94a3b8; text-align: center; margin-bottom: 4px; font-weight: 600; }
        input { width: 100%; padding: 10px; border: 1.5px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; text-align: center; font-size: 1rem; transition: all 0.2s; }
        input:focus { outline: none; border-color: var(--primary); background-color: #f8faff; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        .single-input { width: 100%; padding: 12px; border: 1.5px solid #cbd5e1; border-radius: 6px; font-weight: 600; }
        button { width: 100%; padding: 16px; background-color: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; font-weight: 700; margin-top: 10px; transition: all 0.2s; }
        button:hover { background-color: #1d4ed8; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        #result { margin-top: 25px; padding: 20px; border-radius: 10px; display: none; line-height: 1.6; border: 1px solid transparent; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .success { background-color: #f0fdf4; color: #166534; border-color: #bbf7d0; }
        .error { background-color: #fef2f2; color: #991b1b; border-color: #fecaca; }
        .highlight { font-weight: bold; color: var(--primary); font-size: 1.25rem; border-bottom: 1px dashed var(--primary); }
        hr { border: 0; border-top: 1px solid #e2e8f0; margin: 15px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>Troop Optimizer For Top Commander</h2>
    
    <div class="input-group" style="border-left: 4px solid #f59e0b;">
        <label class="group-title">Total Speedups You Will Use For Training</label>
        <div class="time-inputs">
            <div class="time-unit"><label>Days</label><input type="number" id="sd" value="0" min="0"></div>
            <div class="time-unit"><label>Hours</label><input type="number" id="sh" value="0" min="0"></div>
            <div class="time-unit"><label>Mins</label><input type="number" id="sm" value="0" min="0"></div>
        </div>
    </div>

    <div class="input-group">
        <label class="group-title">Existing T5 Troops in Barracks</label>
        <input type="number" id="currentT5" class="single-input" placeholder="e.g. 50000">
    </div>

    <div class="input-group">
        <label class="group-title">Time to Train 2,000 New T5</label>
        <div class="time-inputs">
            <div class="time-unit"><label>Days</label><input type="number" id="d1" value="0" min="0"></div>
            <div class="time-unit"><label>Hours</label><input type="number" id="h1" value="0" min="0"></div>
            <div class="time-unit"><label>Mins</label><input type="number" id="m1" value="0" min="0"></div>
            <div class="time-unit"><label>Secs</label><input type="number" id="s1" value="0" min="0"></div>
        </div>
    </div>

    <div class="input-group">
        <label class="group-title">Time to Upgrade 2,000 T5 to T6</label>
        <div class="time-inputs">
            <div class="time-unit"><label>Hours</label><input type="number" id="h2" value="0" min="0"></div>
            <div class="time-unit"><label>Mins</label><input type="number" id="m2" value="0" min="0"></div>
            <div class="time-unit"><label>Secs</label><input type="number" id="s2" value="0" min="0"></div>
        </div>
    </div>

    <button onclick="calculate()">Calculate Strategy</button>

    <div id="result"></div>
</div>

<script>
    function calculate() {
        // Convert Total Speedups to minutes
        const sd = parseFloat(document.getElementById('sd').value) || 0;
        const sh = parseFloat(document.getElementById('sh').value) || 0;
        const sm = parseFloat(document.getElementById('sm').value) || 0;
        const totalS = (sd * 1440) + (sh * 60) + sm;

        const currentT5 = parseFloat(document.getElementById('currentT5').value) || 0;

        // Convert Training Time T5 to total minutes
        const d1 = parseFloat(document.getElementById('d1').value) || 0;
        const h1 = parseFloat(document.getElementById('h1').value) || 0;
        const m1 = parseFloat(document.getElementById('m1').value) || 0;
        const s1 = parseFloat(document.getElementById('s1').value) || 0;
        const totalMinTrain = (d1 * 1440) + (h1 * 60) + m1 + (s1 / 60);

        // Convert Upgrade Time T5->T6 to total minutes
        const h2 = parseFloat(document.getElementById('h2').value) || 0;
        const m2 = parseFloat(document.getElementById('m2').value) || 0;
        const s2 = parseFloat(document.getElementById('s2').value) || 0;
        const totalMinUpgrade = (h2 * 60) + m2 + (s2 / 60);

        const resultDiv = document.getElementById('result');

        if (totalMinTrain <= 0 || totalMinUpgrade <= 0) {
            resultDiv.className = 'error';
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '⚠️ Please enter valid training and upgrade times.';
            return;
        }

        // Time per individual unit
        const t_train = totalMinTrain / 2000;
        const t_up = totalMinUpgrade / 2000;

        // Logic: TotalSpeed = (X * t_train) + ((X + currentT5) * t_up)
        // Solve for X: X = (TotalSpeed - (currentT5 * t_up)) / (t_train + t_up)
        const X = (totalS - (currentT5 * t_up)) / (t_train + t_up);

        resultDiv.style.display = 'block';
        
        if (X < 0) {
            const reqMin = Math.ceil(currentT5 * t_up);
            const reqDays = Math.floor(reqMin / 1440);
            const reqHrs = Math.floor((reqMin % 1440) / 60);
            const reqMins = reqMin % 60;

            resultDiv.className = 'error';
            resultDiv.innerHTML = `
                <strong>Insufficient Speedups!</strong><br>
                To upgrade your current T5, you need <b>${reqMin.toLocaleString()}</b> mins 
                (${reqDays}d ${reqHrs}h ${reqMins}m).<br>
                You are short by <b>${Math.ceil(Math.abs(X * (t_train + t_up)))}</b> minutes.
            `;
        } else {
            resultDiv.className = 'success';
            const trainDay1 = Math.floor(X);
            const totalT6 = Math.floor(X + currentT5);
            
            resultDiv.innerHTML = `
                <strong>Optimal Strategy:</strong><br>
                • Day 1 (Train New T5): <span class="highlight">${trainDay1.toLocaleString()}</span> units<br>
                • Day 2 (Upgrade all to T6): <span class="highlight">${totalT6.toLocaleString()}</span> units<br>
                <hr>
                <small>This plan will consume all <b>${totalS.toLocaleString()}</b> minutes of your speedups.</small>
            `;
        }
    }
</script>

</body>
</html>
