<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Vault Calculator Pro</title>
    <style>
        :root { 
            --primary: #f59e0b; 
            --bg: #f1f5f9; 
            --text: #0f172a; 
            --card: #ffffff;
            --border: #e2e8f0;
        }
        
        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
        }

        .card { 
            background: var(--card); 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 500px; 
        }

        h2 { 
            margin-top: 0; 
            color: var(--primary); 
            text-align: center; 
            font-size: 1.6rem; 
            margin-bottom: 25px; 
            border-bottom: 2px solid #f1f5f9; 
            padding-bottom: 15px; 
        }

        .input-group { 
            margin-bottom: 20px; 
            padding: 15px; 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            background-color: #ffffff; 
        }

        .group-title { 
            display: block; 
            margin-bottom: 12px; 
            font-weight: 700; 
            font-size: 0.85rem; 
            color: #475569; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }

        input[type="number"] { 
            width: 100%; 
            padding: 12px; 
            border: 1.5px solid #cbd5e1; 
            border-radius: 6px; 
            box-sizing: border-box; 
            font-size: 1rem; 
            font-weight: 600;
            transition: all 0.2s; 
        }

        input:focus { 
            outline: none; 
            border-color: var(--primary); 
            background-color: #fffbeb; 
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1); 
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 5px;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .checkbox-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #334155;
        }

        #result { 
            margin-top: 25px; 
            display: none; 
            animation: fadeIn 0.4s ease; 
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .day-card {
            background-color: #fff;
            border: 1px solid var(--border);
            border-left: 4px solid var(--primary);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .day-num { font-weight: 800; color: #1e293b; margin-bottom: 4px; display: block; }
        .highlight { color: #b45309; font-weight: 700; }
        .got-it { color: #16a34a; font-weight: 700; font-size: 1.05rem; }
        hr { border: 0; border-top: 1px solid #e2e8f0; margin: 15px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>Gold Vault Manager</h2>
    
    <div class="input-group" style="border-left: 4px solid #f59e0b;">
        <label class="group-title">Gold in vault</label>
        <input type="number" id="goldInput" placeholder="Enter total gold..." oninput="calculate()">
    </div>

    <div class="input-group">
        <label class="checkbox-group">
            <input type="checkbox" id="r5Check" onchange="calculate()">
            <span class="checkbox-label">Contribute to R5 (30% instead of 20%)</span>
        </label>
    </div>

    <div id="result"></div>
</div>

<script>
    function calculate() {
        const goldVal = document.getElementById('goldInput').value;
        const isR5 = document.getElementById('r5Check').checked;
        const resultDiv = document.getElementById('result');
        
        let currentGold = parseFloat(goldVal);
        let totalGot = 0;
        let rate = isR5 ? 0.3 : 0.2;
        
        resultDiv.innerHTML = "";

        if (!goldVal || currentGold <= 0) {
            resultDiv.style.display = 'none';
            return;
        }

        resultDiv.style.display = 'block';

        for (let day = 1; day <= 7; day++) {
            let withdraw = currentGold * rate;
            currentGold -= withdraw;
            totalGot += withdraw;

            const dayDiv = document.createElement('div');
            dayDiv.className = 'day-card';
            dayDiv.innerHTML = `
                <span class="day-num">Day ${day}</span>
                Withdraw: <span class="highlight">${formatNum(withdraw)}</span> Gold<br>
                Remaining: <span style="color: #64748b;">${formatNum(currentGold)} Gold</span>
                <hr>
                You got: <span class="got-it">${formatNum(totalGot)}</span> gold
            `;
            resultDiv.appendChild(dayDiv);
        }
    }

    function formatNum(num) {
        return num.toLocaleString('en-US', { maximumFractionDigits: 0 });
    }
</script>

</body>
</html>
